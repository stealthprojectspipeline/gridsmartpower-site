<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridsmartpower inc.</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #030303;
      color: #e8e1d4;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 1100px;
    }

    h1 {
      margin: 0 0 clamp(26px, 5vw, 42px);
      font-size: clamp(2.1rem, 7vw, 5rem);
      font-weight: 400;
      letter-spacing: clamp(0.04em, 1vw, 0.12em);
      line-height: 1.15;
      text-transform: lowercase;
      overflow-wrap: anywhere;
      text-shadow: 0 0 8px rgba(232, 225, 212, 0.22);
    }

    .line {
      width: clamp(90px, 18vw, 165px);
      height: 1px;
      background: #8f8778;
      margin: 0 auto clamp(28px, 5vw, 42px);
    }

    .small-line {
      width: clamp(55px, 11vw, 95px);
      height: 1px;
      background: #8f8778;
      margin: clamp(26px, 5vw, 38px) auto;
    }

    p {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.5rem);
      letter-spacing: clamp(0.12em, 2vw, 0.25em);
      line-height: 1.35;
      text-transform: lowercase;
    }

    .coming {
      font-size: clamp(1.25rem, 3.2vw, 2.15rem);
      letter-spacing: clamp(0.08em, 1.5vw, 0.18em);
    }

    .email-icon {
      margin-top: clamp(36px, 7vw, 55px);
      font-size: clamp(1.9rem, 5vw, 2.4rem);
      line-height: 1;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      color: #e8e1d4;
      text-decoration: none;
      font-size: clamp(1rem, 3vw, 1.9rem);
      letter-spacing: clamp(0.04em, 1vw, 0.12em);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    a:hover {
      opacity: 0.75;
    }

    @media (max-width: 420px) {
      body {
        padding: 18px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>gridsmartpower inc.</h1>
    <div class="line"></div>

    <p>stealth mode</p>
    <div class="small-line"></div>

    <p class="coming">site is coming momentarily</p>

    <div class="email-icon">✉</div>
    <a href="mailto:connect@gridsmartpower.ca">connect@gridsmartpower.ca</a>
  </main>
</body>
</html>
