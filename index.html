<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridsmartpower inc.</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #030303;
      font-family: Georgia, "Times New Roman", serif;
      color: #e8e1d4;
    }

    .top-left {
      position: absolute;
      top: 28px;
      left: 32px;
    }

    .top-left p,
    .top-left a {
      margin: 0;
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      line-height: 1.8;
      text-transform: lowercase;
      color: #e8e1d4;
      text-decoration: none;
    }

    .top-left a {
      opacity: 0.9;
    }

    .top-left a:hover {
      opacity: 0.65;
    }

    @media (max-width: 480px) {
      .top-left {
        top: 22px;
        left: 22px;
      }

      .top-left p,
      .top-left a {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>

<body>
  <div class="top-left">
    <p>stealth mode</p>

    <a href="mailto:connect@gridsmartpower.ca">
      connect@gridsmartpower.ca
    </a>
  </div>
</body>
</html>
