<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridsmartpower inc.</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #030303;
      color: #e8e1d4;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    main {
      width: 100%;
      max-width: 700px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(0.55rem, 0.9vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      line-height: 1.2;
      text-transform: lowercase;
    }

    p {
      margin: 0;
      font-size: clamp(0.32rem, 0.42vw, 0.48rem);
      letter-spacing: 0.28em;
      line-height: 1.8;
      text-transform: lowercase;
      font-weight: 400;
    }

    .coming {
      margin-top: 10px;
    }

    a {
      display: inline-block;
      margin-top: 26px;
      color: #e8e1d4;
      text-decoration: none;
      font-size: clamp(0.32rem, 0.42vw, 0.48rem);
      letter-spacing: 0.16em;
      line-height: 1.5;
      text-transform: lowercase;
      opacity: 0.9;
    }

    a:hover {
      opacity: 0.65;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 0.75rem;
      }

      p,
      a {
        font-size: 0.5rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 0.7rem;
        letter-spacing: 0.12em;
      }

      p,
      a {
        font-size: 0.46rem;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>gridsmartpower inc.</h1>

    <p>stealth mode</p>

    <p class="coming">site is coming momentarily</p>

    <a href="mailto:connect@gridsmartpower.ca">
      connect@gridsmartpower.ca
    </a>
  </main>
</body>
</html>
