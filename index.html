<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridsmartpower inc.</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #030303;
      color: #e8e1d4;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 900px;
    }

    h1,
    p,
    a {
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.16em;
      line-height: 1.9;
      text-transform: lowercase;
      margin: 0;
      color: #e8e1d4;
      text-decoration: none;
    }

    .coming {
      margin-top: 8px;
    }

    a {
      display: inline-block;
      margin-top: 26px;
      opacity: 0.92;
    }

    a:hover {
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      h1,
      p,
      a {
        font-size: 0.82rem;
        letter-spacing: 0.12em;
      }
    }

    @media (max-width: 480px) {
      h1,
      p,
      a {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        line-height: 1.8;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>gridsmartpower inc.</h1>

    <p>stealth mode</p>

    <p class="coming">site is coming momentarily</p>

    <a href="mailto:connect@gridsmartpower.ca">
      connect@gridsmartpower.ca
    </a>
  </main>
</body>
</html>
