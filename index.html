<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridsmartpower inc.</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #030303;
    color: #e8e1d4;
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  main {
    width: 100%;
    max-width: 900px;
  }

  h1 {
    margin: 0 0 24px;
    font-size: clamp(1.8rem, 3vw, 3.2rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.2;
    text-transform: lowercase;
  }

  .line {
    width: 120px;
    height: 1px;
    background: #8f8778;
    margin: 0 auto 24px;
    opacity: 0.7;
  }

  .small-line {
    width: 70px;
    height: 1px;
    background: #8f8778;
    margin: 24px auto;
    opacity: 0.7;
  }

  p {
    margin: 0;
    font-size: clamp(1rem, 1.5vw, 1.6rem);
    letter-spacing: 0.22em;
    line-height: 1.5;
    text-transform: lowercase;
    font-weight: 400;
  }

  .coming {
    font-size: clamp(0.95rem, 1.4vw, 1.4rem);
    letter-spacing: 0.14em;
  }

  .email-icon {
    margin-top: 42px;
    font-size: 1.5rem;
    opacity: 0.9;
  }

  a {
    display: inline-block;
    margin-top: 16px;
    color: #e8e1d4;
    text-decoration: none;
    font-size: clamp(0.9rem, 1.2vw, 1.2rem);
    letter-spacing: 0.08em;
    line-height: 1.4;
  }

  a:hover {
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 1.7rem;
    }

    p {
      letter-spacing: 0.12em;
    }
  }
</style>
</head>

<body>
  <main>
    <h1>gridsmartpower inc.</h1>
    <div class="line"></div>

    <p>stealth mode</p>
    <div class="small-line"></div>

    <p class="coming">site is coming momentarily</p>

    <div class="email-icon">✉</div>
    <a href="mailto:connect@gridsmartpower.ca">connect@gridsmartpower.ca</a>
  </main>
</body>
</html>
